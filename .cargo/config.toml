[build]
target = "xtensa-esp32s3-espidf"

[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor" # <-- A MÁGICA ACONTECE AQUI
rustflags = [
    "--cfg", "espidf_time64",
    "-C", "default-linker-libraries",
    "-C", "link-arg=-Wl,--allow-multiple-definition"
]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU="esp32s3"